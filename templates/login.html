<!DOCTYPE html>
<html>
<head>
<title>Les Go Study - Login</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to bottom right, #dbeafe, #eef2ff);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    text-align: center;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #3b82f6;
    margin-bottom: 10px;
}

.title {
    font-size: 22px;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 20px;
    border: none;
    font-size: 16px;
    color: white;
    cursor: pointer;
}

.login-btn {
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

.register-btn {
    background: linear-gradient(to right, #7b5cff, #b06cff);
}

button:hover {
    opacity: 0.9;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">Les Go Stdy</div>

<div class="title">Login</div>

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button class="login-btn">Login</button>

</form>

<form method="GET" action="/register">
<button class="register-btn">Create Account</button>
</form>

</div>

</body>
</html>
