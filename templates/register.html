<!DOCTYPE html>
<html>
<head>
<title>Les Go Stdy - Create Account</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #c7d2fe, #e0e7ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Main card */
.card{
    background:white;
    width:400px;
    padding:30px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Logo */
.logo{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#4f46e5;
    margin-bottom:5px;
}

/* Title */
.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

/* Input */
.input-box{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    border:none;
    background:#f3f4f6;
    font-size:15px;
}

/* Dropdown */
select{
    width:100%;
    padding:14px;
    margin-top:8px;
    border-radius:14px;
    border:none;
    background:#f3f4f6;
    font-size:15px;
}

/* Buttons */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
    color:white;
}

/* Create account button */
.create-btn{
    background: linear-gradient(to right, #4facfe, #00f2fe);
}

/* Login button */
.login-btn{
    background: linear-gradient(to right, #7b5cff, #b06cff);
}

/* Hover */
.btn:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">Les Go Stdy</div>

<div class="title">Create Your Account</div>

<form method="POST">

<input type="text"
class="input-box"
name="userid"
value="ID1000000000"
readonly>

<input type="text"
class="input-box"
name="name"
placeholder="Name"
required>

<input type="email"
class="input-box"
name="email"
placeholder="Email"
required>

<input type="password"
class="input-box"
name="password"
placeholder="Password"
required>

<select name="language" required>

<option value="">Language Preference</option>

<option value="English">English</option>

<option value="Malayalam">Malayalam</option>

<option value="Hindi">Hindi</option>

</select>

<button type="submit"
class="btn create-btn">
Create Accounts
</button>

</form>

<a href="/">

<button class="btn login-btn">
Login
</button>

</a>

</div>

</body>
</html>
