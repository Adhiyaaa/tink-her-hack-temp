<!DOCTYPE html>
<html>
<head>
<title>Les Go Study - Subjects</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#c7d2fe,#e0e7ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Main card */
.card{
    background:white;
    width:420px;
    padding:25px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Logo */
.logo{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#4f46e5;
    margin-bottom:10px;
}

/* Title */
.title{
    text-align:center;
    font-size:22px;
    margin-bottom:20px;
}

/* Input box */
.input-box{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    border:none;
    background:#f3f4f6;
    font-size:15px;
}

/* Row layout */
.row{
    display:flex;
    gap:10px;
}

/* Button */
.btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
    background:linear-gradient(to right,#4facfe,#00f2fe);
    color:white;
}

/* Subject list title */
.subtitle{
    font-size:18px;
    margin-top:20px;
    margin-bottom:10px;
}

/* Subject item */
.subject{
    background:#f3f4f6;
    padding:12px;
    border-radius:15px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

/* Left part */
.subject-left{
    display:flex;
    align-items:center;
    gap:10px;
}

/* Dot */
.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#6366f1;
}

/* Subject text */
.subject-text{
    font-size:15px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">Les Go Stdy</div>

<div class="title">Set Up Your Subjects</div>

<form method="POST">

<input type="text" name="subject" class="input-box"
placeholder="Subject Name" required>

<input type="email" name="email" class="input-box"
placeholder="Email" required>

<div class="row">

<select name="difficulty" class="input-box" required>
<option value="">Difficulty Level</option>
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<input type="number" name="hours" class="input-box"
placeholder="Study Time (hrs/week)" required>

</div>

<button class="btn">Add Subject</button>

</form>


<div class="subtitle">My Subjects</div>


<!-- Example subjects -->
<div class="subject">
<div class="subject-left">
<div class="dot"></div>
<div class="subject-text">
Mathematics (Hard, 5 hrs/week)
</div>
</div>
</div>


<div class="subject">
<div class="subject-left">
<div class="dot" style="background:#3b82f6;"></div>
<div class="subject-text">
Physics (Medium, 4 hrs/week)
</div>
</div>
</div>


<div class="subject">
<div class="subject-left">
<div class="dot" style="background:#8b5cf6;"></div>
<div class="subject-text">
History (Easy, 3 hrs/week)
</div>
</div>
</div>


</div>

</body>
</html>
