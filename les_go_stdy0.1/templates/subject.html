<!DOCTYPE html>
<html>
<head>
<title>Les Go Stdy - Subjects</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#c7d2fe,#e0e7ff);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Main card */
.card{
    background:white;
    width:400px;
    padding:25px;
    border-radius:25px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* Logo */
.logo{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#4f46e5;
}

/* Title */
.title{
    text-align:center;
    font-size:22px;
    margin:15px 0 20px 0;
}

/* Inputs */
.input-box{
    width:100%;
    padding:14px;
    margin:8px 0;
    border-radius:14px;
    border:none;
    background:#f3f4f6;
    font-size:15px;
}

/* Row layout */
.row{
    display:flex;
    gap:10px;
}

/* Add button */
.add-btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    color:white;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

.add-btn:hover{
    opacity:0.9;
}

/* Next button */
.next-btn{
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:25px;
    font-size:16px;
    cursor:pointer;
    color:white;
    background:linear-gradient(to right,#6366f1,#8b5cf6);
}

.next-btn:hover{
    opacity:0.9;
}

/* Subject list title */
.subtitle{
    font-size:18px;
    margin-top:20px;
    margin-bottom:10px;
}

/* Subject item */
.subject{
    background:#f3f4f6;
    padding:12px;
    border-radius:15px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
}

/* Dot */
.dot{
    width:12px;
    height:12px;
    border-radius:50%;
    background:#6366f1;
    margin-right:10px;
}

/* Subject text */
.subject-text{
    font-size:15px;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">Les Go Stdy</div>

<div class="title">Set Up Your Subjects</div>

<form method="POST">

<input type="text"
class="input-box"
name="subject"
placeholder="Subject Name"
required>

<input type="email"
class="input-box"
name="email"
placeholder="Email"
required>

<div class="row">

<select name="difficulty"
class="input-box"
required>

<option value="">Difficulty Level</option>
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>

</select>

<input type="number"
class="input-box"
name="hours"
placeholder="Study Time (hrs/week)"
required>

</div>

<button type="submit" class="add-btn">
Add Subject
</button>

</form>

<!-- NEXT BUTTON -->
<button type="button" class="next-btn"
onclick="window.location.href='/next'">
Next →
</button>

<div class="subtitle">My Subjects</div>

<!-- Example subjects -->

<div class="subject">
<div class="dot"></div>
<div class="subject-text">
Mathematics (Hard, 5 hrs/week)
</div>
</div>

<div class="subject">
<div class="dot" style="background:#3b82f6;"></div>
<div class="subject-text">
Physics (Medium, 4 hrs/week)
</div>
</div>

<div class="subject">
<div class="dot" style="background:#8b5cf6;"></div>
<div class="subject-text">
History (Easy, 3 hrs/week)
</div>
</div>

</div>

</body>
</html>
